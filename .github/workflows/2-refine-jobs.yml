name: process

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 5 * * *'
    - cron: '30 10 * * *'
    - cron: '30 15 * * *'
    - cron: '30 20 * * *'
  workflow_dispatch:
    inputs:
      max_per_company:
        description: 'Max jobs per source'
        required: false
        default: '3'
      limit:
        description: 'Max total jobs per run'
        required: false
        default: '6'
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apifromurl/package-lock.json

      - name: Install
        working-directory: apifromurl
        run: npm ci

      - name: Run
        working-directory: apifromurl
        env:
          DB2_URL: ${{ secrets.DB2_URL }}
          DB2_KEY: ${{ secrets.DB2_KEY }}
          MAIN_DB_URL: ${{ secrets.MAIN_DB_URL }}
          MAIN_DB_KEY: ${{ secrets.MAIN_DB_KEY }}
          DB1_URL: ${{ secrets.DB1_URL }}
          DB1_KEY: ${{ secrets.DB1_KEY }}
          AI_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          MAX_CO="${{ github.event.inputs.max_per_company }}"
          if [ -z "$MAX_CO" ]; then MAX_CO="3"; fi
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="6"; fi
          ARGS="--max-per-company=$MAX_CO --limit=$LIMIT"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node processor.js $ARGS
