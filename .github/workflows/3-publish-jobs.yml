name: publish

on:
  schedule:
    - cron: '0 1 * * *'
    - cron: '0 6 * * *'
    - cron: '0 11 * * *'
    - cron: '0 16 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max jobs per run'
        required: false
        default: '6'
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apifromurl/package-lock.json

      - name: Install
        working-directory: apifromurl
        run: npm ci

      - name: Run
        working-directory: apifromurl
        env:
          MAIN_DB_URL: ${{ secrets.MAIN_DB_URL }}
          MAIN_DB_KEY: ${{ secrets.MAIN_DB_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="6"; fi
          ARGS="--limit=$LIMIT"
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node publisher.js $ARGS
