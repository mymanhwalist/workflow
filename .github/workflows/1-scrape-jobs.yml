name: collect

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 5 * * *'
    - cron: '0 10 * * *'
    - cron: '0 15 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      limit:
        description: 'Max endpoints per run'
        required: false
        default: '1000'
      max_pending_per_company:
        description: 'Max new jobs per source'
        required: false
        default: '3'
      provider:
        description: 'Filter by provider'
        required: false
        default: ''
      all_providers:
        description: 'Include all providers'
        required: false
        default: 'false'
        type: boolean
      force:
        description: 'Force re-run'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry run'
        required: false
        default: 'false'
        type: boolean

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apifromurl/package-lock.json

      - name: Install
        working-directory: apifromurl
        run: npm ci

      - name: Run
        working-directory: apifromurl
        env:
          DB2_URL: ${{ secrets.DB2_URL }}
          DB2_KEY: ${{ secrets.DB2_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT="1000"; fi
          MAX_PER="${{ github.event.inputs.max_pending_per_company }}"
          if [ -z "$MAX_PER" ]; then MAX_PER="3"; fi
          ARGS="--limit=$LIMIT --max-pending-per-company=$MAX_PER"
          if [ "${{ github.event.inputs.all_providers }}" != "true" ]; then
            ARGS="$ARGS --reliable-dates-only"
          fi
          if [ -n "${{ github.event.inputs.provider }}" ]; then
            ARGS="$ARGS --provider=${{ github.event.inputs.provider }}"
          fi
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          node scraper.js $ARGS
